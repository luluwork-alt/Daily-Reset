<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Reset</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#EEF2EC;--surface:#FBFCFA;--ink:#20302B;--muted:#6B7A72;--faint:#93A29A;
  --accent:#2F6F5E;--accent-soft:#DCEAE2;--reward:#D2913F;--reward-soft:#F4E6CF;
  --line:#DAE2DA;--line-strong:#C6D1C7;--radius:16px;
  --shadow:0 1px 2px rgba(32,48,43,.04),0 8px 24px rgba(32,48,43,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
.wrap{max-width:680px;margin:0 auto;padding:40px 22px 80px;}
header{margin-bottom:34px;}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:10px;}
.greeting{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(30px,7vw,44px);line-height:1.08;margin-bottom:6px;letter-spacing:-.01em;}
.greeting em{font-style:italic;color:var(--accent);}
.date-line{color:var(--muted);font-size:15px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px 22px;margin-bottom:18px;box-shadow:var(--shadow);}
.card-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px;}
.card h2{font-family:'Fraunces',serif;font-weight:500;font-size:21px;letter-spacing:-.01em;}
.hint{color:var(--muted);font-size:13.5px;margin:6px 0 18px;max-width:46ch;}
.count-pill{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:100px;white-space:nowrap;}

/* Three */
.three-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);}
.three-row:last-child{border-bottom:none;}
.num{font-family:'Fraunces',serif;font-size:20px;color:var(--faint);width:22px;text-align:center;flex:none;transition:color .2s;}
.three-row.done .num{color:var(--reward);}
.check{width:24px;height:24px;flex:none;border-radius:8px;border:1.5px solid var(--line-strong);background:transparent;cursor:pointer;display:grid;place-items:center;transition:background .18s,border-color .18s,transform .1s;}
.check:hover{border-color:var(--accent);}
.check:active{transform:scale(.92);}
.check svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .18s;}
.check.on{background:var(--reward);border-color:var(--reward);}
.check.on svg{opacity:1;}
.three-input{flex:1;border:none;background:transparent;font:inherit;color:var(--ink);padding:4px 0;min-width:0;}
.three-input::placeholder{color:var(--faint);}
.three-input:focus{outline:none;}
.three-row.done .three-input{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--line-strong);}

/* Habits */
.habit-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);}
.habit-row:last-child{border-bottom:none;}
.habit-name{flex:1;font-size:15.5px;}
.habit-row.done .habit-name{color:var(--muted);}
.habit-edit{flex:1;border:1px solid var(--line-strong);border-radius:8px;font:inherit;padding:7px 10px;color:var(--ink);background:var(--bg);}
.habit-edit:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
.streak{font-size:11.5px;font-weight:600;color:var(--reward);background:var(--reward-soft);padding:3px 9px;border-radius:100px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.remove-btn{border:none;background:none;color:var(--faint);cursor:pointer;font-size:20px;line-height:1;padding:0 4px;}
.remove-btn:hover{color:#b4543f;}
.add-habit{margin-top:14px;display:flex;gap:8px;}
.add-habit input{flex:1;border:1px solid var(--line-strong);border-radius:9px;font:inherit;padding:9px 12px;background:var(--bg);}
.add-habit input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}

/* Dump */
.dump-form{display:flex;gap:8px;margin-bottom:14px;}
.dump-form input{flex:1;border:1px solid var(--line-strong);border-radius:9px;font:inherit;padding:10px 13px;background:var(--bg);}
.dump-form input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
.dump-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px;}
.dump-item:last-child{border-bottom:none;}
.dump-item span{flex:1;}
.promote{border:1px solid var(--accent-soft);background:var(--accent-soft);color:var(--accent);border-radius:7px;cursor:pointer;font:inherit;font-size:12px;font-weight:600;padding:4px 9px;}
.promote:hover{background:var(--accent);color:#fff;}
.empty{color:var(--faint);font-size:14px;font-style:italic;padding:6px 0;}

/* Momentum */
.momentum{background:var(--ink);border-color:var(--ink);}
.momentum h2{color:#F2F6F2;}
.momentum .hint{color:#9DB0A6;}
.strip{display:flex;justify-content:space-between;gap:6px;margin-top:6px;}
.day-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
.dots{display:flex;flex-direction:column;gap:5px;}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.10);transition:background .25s;}
.dot.on{background:var(--reward);}
.day-col.today .dlabel{color:var(--reward);font-weight:600;}
.dlabel{font-size:11px;color:#7E928A;}
.dnum{font-size:12px;color:#B9C7BF;}

/* Gist sync card */
.gist-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px;box-shadow:var(--shadow);}
.gist-row{display:flex;align-items:center;gap:12px;}
.gist-icon{font-size:22px;flex:none;}
.gist-label{flex:1;font-size:14px;color:var(--ink);font-weight:500;}
.gist-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400;}
.sync-btn{border:none;border-radius:9px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;padding:8px 16px;transition:background .15s,color .15s;white-space:nowrap;}
.sync-btn.idle{background:var(--accent);color:#fff;}
.sync-btn.idle:hover{background:#255a4b;}
.sync-btn.syncing{background:var(--accent-soft);color:var(--accent);cursor:default;}
.sync-btn.synced{background:#e6f4ee;color:#256f4a;}
.sync-btn.error{background:#fdecea;color:#b4543f;}
.gist-setup{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
.gist-setup input{border:1px solid var(--line-strong);border-radius:9px;font:inherit;padding:10px 13px;background:var(--bg);width:100%;}
.gist-setup input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
.gist-setup label{font-size:13px;color:var(--muted);}
.gist-setup a{color:var(--accent);font-size:13px;}
.status-msg{font-size:12.5px;margin-top:10px;padding:8px 12px;border-radius:8px;line-height:1.5;}
.status-msg.ok{background:#e6f4ee;color:#256f4a;}
.status-msg.err{background:#fdecea;color:#b4543f;}
.status-msg.info{background:var(--accent-soft);color:var(--accent);}

.btn-link{border:none;background:none;color:var(--accent);cursor:pointer;font:inherit;font-size:13px;font-weight:600;}
.btn-link:hover{text-decoration:underline;}
.plus-btn{width:24px;height:24px;flex:none;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:grid;place-items:center;font-size:18px;line-height:1;}
footer{text-align:center;color:var(--faint);font-size:12.5px;margin-top:26px;line-height:1.8;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
(function(){
  const LS_KEY = 'daily-reset-v1';
  const LS_GIST = 'daily-reset-gist';
  const app = document.getElementById('app');

  const DEFAULT_HABITS = [
    {id:'h1', name:'Set my Three before checking messages'},
    {id:'h2', name:'One distraction-free focus block'},
    {id:'h3', name:'A real break away from the screen'},
    {id:'h4', name:'Honor a hard stop to the workday'},
  ];

  let state = {habits: DEFAULT_HABITS.slice(), days: {}};
  let gistCfg = {token:'', gistId:''};
  let editingHabits = false;
  let showGistSetup = false;
  let syncStatus = 'idle'; // idle | syncing | synced | error
  let syncMsg = '';
  let saveTimer = null;

  // ── localStorage (always-on, reliable) ──────────────────────────
  function loadLocal(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(raw){ const p = JSON.parse(raw);
        state.habits = Array.isArray(p.habits)&&p.habits.length ? p.habits : DEFAULT_HABITS.slice();
        state.days = p.days || {};
      }
      const g = localStorage.getItem(LS_GIST);
      if(g){ gistCfg = JSON.parse(g); }
    }catch(e){}
  }

  function saveLocal(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
    }, 200);
  }

  function saveGistCfg(){
    try{ localStorage.setItem(LS_GIST, JSON.stringify(gistCfg)); }catch(e){}
  }

  // ── date helpers ─────────────────────────────────────────────────
  const keyFor = d => { const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; };
  const todayKey = () => keyFor(new Date());

  function getDay(k){
    if(!state.days[k]) state.days[k] = {top3:[{text:'',done:false},{text:'',done:false},{text:'',done:false}],habits:{},dump:[]};
    const d = state.days[k];
    if(!d.top3) d.top3 = [{text:'',done:false},{text:'',done:false},{text:'',done:false}];
    if(!d.habits) d.habits = {};
    if(!d.dump) d.dump = [];
    return d;
  }

  // ── GitHub Gist sync ─────────────────────────────────────────────
  async function syncToGist(){
    if(!gistCfg.token){ showGistSetup=true; render(); return; }
    syncStatus='syncing'; syncMsg=''; render();
    const body = JSON.stringify(state, null, 2);
    const filename = 'daily-reset-data.json';
    try{
      let url, method;
      if(gistCfg.gistId){
        url = `https://api.github.com/gists/${gistCfg.gistId}`;
        method = 'PATCH';
      } else {
        url = 'https://api.github.com/gists';
        method = 'POST';
      }
      const res = await fetch(url,{
        method,
        headers:{'Authorization':`token ${gistCfg.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
        body: JSON.stringify({
          description:'Daily Reset — personal data backup',
          public: false,
          files:{ [filename]:{ content: body } }
        })
      });
      if(!res.ok){ const e=await res.json(); throw new Error(e.message||res.status); }
      const data = await res.json();
      gistCfg.gistId = data.id;
      saveGistCfg();
      syncStatus='synced';
      syncMsg=`Backed up to private Gist · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    }catch(e){
      syncStatus='error';
      syncMsg=`Sync failed: ${e.message}. Check your token and try again.`;
    }
    render();
  }

  async function loadFromGist(){
    if(!gistCfg.token||!gistCfg.gistId) return;
    try{
      const res = await fetch(`https://api.github.com/gists/${gistCfg.gistId}`,{
        headers:{'Authorization':`token ${gistCfg.token}`,'Accept':'application/vnd.github.v3+json'}
      });
      if(!res.ok) return;
      const data = await res.json();
      const file = data.files['daily-reset-data.json'];
      if(file&&file.content){
        const p = JSON.parse(file.content);
        state.habits = Array.isArray(p.habits)&&p.habits.length ? p.habits : DEFAULT_HABITS.slice();
        state.days = p.days||{};
        saveLocal();
      }
    }catch(e){}
  }

  // ── streak ───────────────────────────────────────────────────────
  function streakFor(id){
    let n=0; const start=new Date();
    const todayDone=(state.days[todayKey()]||{}).habits?.[id];
    if(!todayDone) start.setDate(start.getDate()-1);
    for(let i=0;i<400;i++){
      const d=new Date(start); d.setDate(start.getDate()-i);
      const day=state.days[keyFor(d)];
      if(day&&day.habits&&day.habits[id]) n++; else break;
    }
    return n;
  }

  // ── svg helpers ──────────────────────────────────────────────────
  const CHECK = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
  const FLAME = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-2 4-2 7a2 2 0 1 0 4 0c2 2 3 3 3 6a5 5 0 0 1-10 0c0-4 4-5 5-13z"/></svg>`;
  const GH   = `<svg viewBox="0 0 24 24" width="20" height="20" fill="var(--ink)"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85.004 1.71.11 2.51.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.6 1.03 2.69 0 3.85-2.34 4.7-4.57 4.95.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg>`;

  const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ── greeting ─────────────────────────────────────────────────────
  function greeting(){
    const h=new Date().getHours();
    if(h<12) return ['Good morning.','Let\'s give the day a <em>shape</em>.'];
    if(h<17) return ['Good afternoon.','A calm <em>reset</em> for the rest of today.'];
    return ['Good evening.','Time to <em>close the loops</em> and wind down.'];
  }

  // ── render ───────────────────────────────────────────────────────
  function render(){
    const k = todayKey();
    const day = getDay(k);
    const [g1,g2] = greeting();
    const longDate = new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
    const doneCount = day.top3.filter(t=>t.done&&t.text.trim()).length;
    const filled = day.top3.filter(t=>t.text.trim()).length;

    const syncLabel = syncStatus==='syncing'?'Syncing…':syncStatus==='synced'?'Sync again':'Backup to GitHub';
    const syncClass = syncStatus==='syncing'?'syncing':syncStatus==='synced'?'synced':syncStatus==='error'?'error':'idle';

    app.innerHTML = `
      <header>
        <p class="eyebrow">Daily Reset</p>
        <h1 class="greeting">${g1}<br>${g2}</h1>
        <p class="date-line">${longDate}</p>
      </header>

      <!-- GitHub Gist backup card -->
      <div class="gist-card">
        <div class="gist-row">
          <span class="gist-icon">${GH}</span>
          <div class="gist-label">
            GitHub Backup
            <div class="gist-sub">${gistCfg.gistId ? 'Saved to your private Gist · data follows you across devices' : 'Back up your data to a private GitHub Gist'}</div>
          </div>
          <button class="sync-btn ${syncClass}" id="sync-btn" ${syncStatus==='syncing'?'disabled':''}>${syncLabel}</button>
        </div>
        ${showGistSetup ? renderGistSetup() : ''}
        ${syncMsg ? `<div class="status-msg ${syncStatus==='error'?'err':syncStatus==='synced'?'ok':'info'}">${esc(syncMsg)}</div>` : ''}
      </div>

      <!-- Today's Three -->
      <section class="card">
        <div class="card-head">
          <h2>Today's Three</h2>
          <span class="count-pill">${doneCount}/${filled||3} done</span>
        </div>
        <p class="hint">Three is the cap, not the goal. Pick what would make today a win — everything else goes to the parking lot.</p>
        <div id="three"></div>
      </section>

      <!-- Parking lot -->
      <section class="card">
        <div class="card-head">
          <h2>Parking lot</h2>
          <button class="btn-link" id="clear-dump" ${day.dump.length?'':'style="visibility:hidden"'}>Clear</button>
        </div>
        <p class="hint">Everything tugging at your attention goes here. Promote anything that earns a spot in your Three.</p>
        <form class="dump-form" id="dump-form">
          <input id="dump-input" placeholder="What's on your mind?" autocomplete="off"/>
          <button class="plus-btn" type="submit" aria-label="Add">+</button>
        </form>
        <div id="dump-list"></div>
      </section>

      <!-- Habits -->
      <section class="card">
        <div class="card-head">
          <h2>Daily habits</h2>
          <button class="btn-link" id="edit-habits">${editingHabits?'Done':'Edit'}</button>
        </div>
        <p class="hint">A few small repeatable anchors. Keep it short — momentum comes from showing up.</p>
        <div id="habits"></div>
        ${editingHabits?`<div class="add-habit"><input id="new-habit" placeholder="Add a habit…" autocomplete="off"/><button class="promote" id="add-habit-btn">Add</button></div>`:''}
      </section>

      <!-- Momentum -->
      <section class="card momentum">
        <h2>Momentum</h2>
        <p class="hint">Your last 7 days — one dot per habit. Watch the pattern fill in.</p>
        <div class="strip" id="strip"></div>
      </section>

      <footer>
        Data saves automatically in your browser.<br>
        Use "Backup to GitHub" to keep it safe across all your devices.
      </footer>
    `;

    renderThree(day);
    renderDump(day);
    renderHabits(day);
    renderStrip();
    wireAll(day);
  }

  function renderGistSetup(){
    return `
      <div class="gist-setup">
        <div>
          <label>GitHub Personal Access Token</label>
          <a href="https://github.com/settings/tokens/new?scopes=gist&description=Daily+Reset" target="_blank" rel="noopener"> — generate one here (Gist scope only)</a>
        </div>
        <input id="gist-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value="${esc(gistCfg.token)}"/>
        <button class="promote" id="gist-save" style="align-self:flex-start;padding:8px 16px">Save &amp; sync</button>
      </div>`;
  }

  function renderThree(day){
    const el = app.querySelector('#three'); el.innerHTML='';
    day.top3.forEach((item,i)=>{
      const row = document.createElement('div');
      row.className = 'three-row'+(item.done&&item.text.trim()?' done':'');
      row.innerHTML = `<span class="num">${i+1}</span>
        <button class="check ${item.done?'on':''}" aria-label="Mark done">${CHECK}</button>
        <input class="three-input" placeholder="Priority ${i+1}…" value="${esc(item.text)}"/>`;
      row.querySelector('.check').addEventListener('click',()=>{ item.done=!item.done; saveLocal(); render(); });
      const inp = row.querySelector('.three-input');
      inp.addEventListener('input',()=>{ item.text=inp.value; saveLocal(); });
      inp.addEventListener('blur',()=>render());
      el.appendChild(row);
    });
  }

  function renderDump(day){
    const el = app.querySelector('#dump-list'); el.innerHTML='';
    if(!day.dump.length){ el.innerHTML='<p class="empty">Nothing parked. A clear lot is a good sign.</p>'; return; }
    day.dump.forEach((d,idx)=>{
      const item = document.createElement('div'); item.className='dump-item';
      item.innerHTML=`<span>${esc(d.text)}</span>
        <button class="promote">→ Three</button>
        <button class="remove-btn" aria-label="Remove">×</button>`;
      item.querySelector('.promote').addEventListener('click',()=>{
        const slot = day.top3.find(t=>!t.text.trim());
        if(slot){ slot.text=d.text; day.dump.splice(idx,1); saveLocal(); render(); }
        else{ const b=item.querySelector('.promote'); const o=b.textContent; b.textContent='Three is full'; setTimeout(()=>b.textContent=o,1100); }
      });
      item.querySelector('.remove-btn').addEventListener('click',()=>{ day.dump.splice(idx,1); saveLocal(); render(); });
      el.appendChild(item);
    });
  }

  function renderHabits(day){
    const el = app.querySelector('#habits'); el.innerHTML='';
    if(!state.habits.length){ el.innerHTML='<p class="empty">No habits yet. Add one below.</p>'; return; }
    state.habits.forEach(h=>{
      const done = !!day.habits[h.id];
      const streak = streakFor(h.id);
      const row = document.createElement('div');
      row.className = 'habit-row'+(done?' done':'');
      if(editingHabits){
        row.innerHTML=`<input class="habit-edit" value="${esc(h.name)}"/><button class="remove-btn" aria-label="Remove">×</button>`;
        row.querySelector('.habit-edit').addEventListener('input',e=>{ h.name=e.target.value; saveLocal(); });
        row.querySelector('.remove-btn').addEventListener('click',()=>{ state.habits=state.habits.filter(x=>x.id!==h.id); saveLocal(); render(); });
      } else {
        row.innerHTML=`<button class="check ${done?'on':''}" aria-label="Mark done">${CHECK}</button>
          <span class="habit-name">${esc(h.name)}</span>
          ${streak>0?`<span class="streak">${FLAME}${streak} day${streak>1?'s':''}</span>`:''}`;
        row.querySelector('.check').addEventListener('click',()=>{
          if(done) delete day.habits[h.id]; else day.habits[h.id]=true;
          saveLocal(); render();
        });
      }
      el.appendChild(row);
    });
  }

  function renderStrip(){
    const el = app.querySelector('#strip'); el.innerHTML='';
    const tkey = todayKey();
    for(let i=6;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k=keyFor(d); const day=state.days[k];
      const col=document.createElement('div');
      col.className='day-col'+(k===tkey?' today':'');
      const dots=state.habits.map(h=>`<div class="dot ${day&&day.habits&&day.habits[h.id]?'on':''}"></div>`).join('');
      col.innerHTML=`<div class="dots">${dots||'<div class="dot"></div>'}</div>
        <div class="dnum">${d.getDate()}</div>
        <div class="dlabel">${d.toLocaleDateString(undefined,{weekday:'short'})[0]}</div>`;
      el.appendChild(col);
    }
  }

  function wireAll(day){
    // Gist sync button
    app.querySelector('#sync-btn').addEventListener('click',()=>{
      if(syncStatus==='syncing') return;
      if(!gistCfg.token){ showGistSetup=!showGistSetup; render(); return; }
      syncToGist();
    });

    // Gist setup save
    const gistSave = app.querySelector('#gist-save');
    if(gistSave){
      gistSave.addEventListener('click',()=>{
        const t = app.querySelector('#gist-token').value.trim();
        if(!t) return;
        gistCfg.token=t; gistCfg.gistId='';
        saveGistCfg(); showGistSetup=false;
        syncToGist();
      });
    }

    // Parking lot
    app.querySelector('#dump-form').addEventListener('submit',e=>{
      e.preventDefault();
      const v=app.querySelector('#dump-input').value.trim();
      if(v){ day.dump.unshift({text:v}); saveLocal(); render(); }
    });
    const clr=app.querySelector('#clear-dump');
    if(clr) clr.addEventListener('click',()=>{ day.dump=[]; saveLocal(); render(); });

    // Habits edit
    app.querySelector('#edit-habits').addEventListener('click',()=>{ editingHabits=!editingHabits; render(); });
    const addBtn=app.querySelector('#add-habit-btn');
    if(addBtn){
      const ni=app.querySelector('#new-habit');
      const add=()=>{ const v=ni.value.trim(); if(v){ state.habits.push({id:'h'+Date.now(),name:v}); saveLocal(); render(); } };
      addBtn.addEventListener('click',add);
      ni.addEventListener('keydown',e=>{ if(e.key==='Enter') add(); });
    }
  }

  // ── boot ─────────────────────────────────────────────────────────
  loadLocal();
  // If Gist is configured, try to pull latest data on open
  if(gistCfg.token && gistCfg.gistId){
    loadFromGist().then(render).catch(render);
  } else {
    render();
  }

})();
</script>
</body>
</html>
